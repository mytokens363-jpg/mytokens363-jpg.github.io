{{ if .IsPage }}
{{ $author := index .Site.Data.authors "marco" }}
{{ if $author }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Article",
  "headline": {{ .Title | jsonify }},
  "description": {{ .Params.description | default "" | jsonify }},
  "datePublished": {{ .Date.Format "2006-01-02" | jsonify }},
  "dateModified": {{ .Lastmod.Format "2006-01-02" | jsonify }},
  "author": {
    "@type": "Person",
    "name": {{ $author.name | jsonify }},
    "jobTitle": {{ $author.title | jsonify }}
  },
  "publisher": {
    "@type": "Organization",
    "name": "Florida Home Costs",
    "url": "https://floridahomecosts.com"
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | jsonify }}
  }
}
</script>
{{ end }}
{{ end }}
