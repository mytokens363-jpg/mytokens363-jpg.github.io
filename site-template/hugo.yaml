baseURL: "https://floridahomecosts.com/"  # CHANGE THIS — your domain or github.io URL
languageCode: "en-us"
title: "Florida Home Costs"
theme: "PaperMod"

# Content organization
contentDir: "content"
publishDir: "public"

# SEO
enableRobotsTXT: true
canonifyURLs: true

# Table of contents (used in sidebar)
markup:
  tableOfContents:
    startLevel: 2
    endLevel: 3
    ordered: false
  goldmark:
    renderer:
      unsafe: true  # Allow raw HTML in markdown if needed

# Taxonomies — organize by category and location
taxonomies:
  category: categories
  tag: tags

# Permalinks — clean SEO-friendly URLs
permalinks:
  roofing: "/roofing/:slug/"
  hurricane-protection: "/hurricane-protection/:slug/"
  exterior: "/exterior/:slug/"
  interior: "/interior/:slug/"
  plumbing: "/plumbing/:slug/"
  electrical: "/electrical/:slug/"
  hvac: "/hvac/:slug/"
  major-systems: "/major-systems/:slug/"
  pool: "/pool/:slug/"

# Sitemap
sitemap:
  changefreq: "weekly"
  priority: 0.5

# Site params
params:
  description: "Accurate home improvement cost guides for Florida homeowners. Real pricing, local building codes, and contractor advice for every county. Updated 2026."
  author: "Florida Home Costs"
  ads_enabled: false  # Toggle ads on/off - set to true after AdSense approval
  
# Output formats — generate sitemap, RSS, and single pages
outputs:
  home: ["HTML", "RSS", "JSON"]
  section: ["HTML", "RSS"]
  single: ["HTML"]

# Menu
menu:
  main:
    - name: "Roofing"
      url: "/roofing/"
      weight: 1
    - name: "Hurricane Protection"
      url: "/hurricane-protection/"
      weight: 2
    - name: "Exterior"
      url: "/exterior/"
      weight: 3
    - name: "Interior"
      url: "/interior/"
      weight: 4
    - name: "HVAC"
      url: "/hvac/"
      weight: 5
    - name: "Pool"
      url: "/pool/"
      weight: 6

# Build settings
buildDrafts: false
buildFuture: false
